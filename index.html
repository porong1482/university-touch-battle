<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학교 터치 배틀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ── 로그인/회원가입 화면 ── */
        #auth-screen {
            width: 100%;
            max-width: 340px;
            margin-top: 40px;
        }
        #auth-screen h1 { font-size: 28px; color: #ff6b6b; text-align: center; margin-bottom: 6px; text-shadow: 2px 2px 0 #ffb3b3; }
        #auth-screen p { text-align: center; color: #ff9999; margin-bottom: 30px; font-size: 14px; }
        .auth-box {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 6px 0 #ffb3b3;
        }
        .auth-box h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 18px; text-align: center; }
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ffb3b3;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            color: #555;
        }
        .auth-box input:focus { border-color: #ff6b6b; }
        .btn-main {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 17px;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #e05555;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #e05555; }
        .btn-sub {
            width: 100%;
            padding: 10px;
            background: white;
            color: #ff6b6b;
            border: 2px solid #ffb3b3;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 15px;
            cursor: pointer;
        }
        .error-msg { color: #ff4444; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }

        /* ── 게임 화면 ── */
        #game-screen { display: none; width: 100%; max-width: 380px; align-items: center; flex-direction: column; }
        h1.game-title { font-size: 26px; color: #ff6b6b; text-shadow: 2px 2px 0 #ffb3b3; margin-bottom: 4px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 14px; }
        .user-info { font-size: 14px; color: #ff9999; }
        .btn-logout { background: none; border: 2px solid #ffb3b3; border-radius: 12px; padding: 4px 12px; font-family: 'Jua', sans-serif; font-size: 13px; color: #ff9999; cursor: pointer; }

        select {
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Jua', sans-serif;
            border-radius: 20px;
            border: 3px solid #ffb3b3;
            background: white;
            margin-bottom: 12px;
            width: 250px;
            color: #ff6b6b;
            cursor: pointer;
        }
        #title-badge {
            font-size: 15px;
            background: #ff6b6b;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: none;
        }
        #touch-area {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: white;
            border: 5px solid #ffb3b3;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.08s;
            user-select: none;
            box-shadow: 0 8px 0 #ffb3b3;
            margin-bottom: 8px;
        }
        #touch-area:active { transform: scale(0.93) translateY(6px); box-shadow: 0 2px 0 #ffb3b3; }
        #touch-emoji { font-size: 60px; line-height: 1; }
        #my-count { font-size: 32px; font-weight: bold; color: #ff6b6b; }
        #touch-label { font-size: 13px; color: #ffb3b3; }

        #inventory { margin-top: 12px; width: 100%; }
        #inventory h3 { font-size: 16px; color: #ff6b6b; margin-bottom: 8px; text-align: center; }
        #item-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .item-chip {
            background: white; border: 2px solid #ffb3b3;
            border-radius: 20px; padding: 4px 12px;
            font-size: 14px; cursor: pointer; transition: all 0.15s;
        }
        .item-chip:hover, .item-chip.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }

        #ranking { width: 100%; }
        #ranking h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 10px; text-align: center; }
        .rank-item {
            background: white; border-radius: 16px;
            padding: 10px 18px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 3px 0 #ffb3b3;
        }
        .rank-num { font-size: 20px; width: 30px; }
        .rank-name { flex: 1; margin-left: 8px; color: #555; font-size: 15px; }
        .rank-count { font-weight: bold; color: #ff6b6b; }

        /* 팝업 */
        #item-popup {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white; border-radius: 24px;
            padding: 30px 40px; text-align: center;
            box-shadow: 0 10px 40px rgba(255,107,107,0.3);
            border: 3px solid #ffb3b3; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #item-popup.show { transform: translate(-50%, -50%) scale(1); }
        #item-popup .popup-emoji { font-size: 60px; }
        #item-popup .popup-title { font-size: 20px; color: #ff6b6b; margin: 8px 0 4px; }
        #item-popup .popup-desc { font-size: 14px; color: #ffb3b3; margin-bottom: 16px; }
        #item-popup button { background: #ff6b6b; color: white; border: none; border-radius: 20px; padding: 8px 30px; font-family: 'Jua', sans-serif; font-size: 16px; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

    <!-- 로그인/회원가입 화면 -->
    <div id="auth-screen">
        <h1>🏫 대학 터치 배틀!</h1>
        <p>터치해서 내 대학교를 1등으로!</p>
        <div class="auth-box" id="login-box">
            <h2>🔑 로그인</h2>
            <input type="text" id="login-username" placeholder="닉네임" />
            <input type="password" id="login-password" placeholder="비밀번호" />
            <div class="error-msg" id="login-error"></div>
            <button class="btn-main" onclick="doLogin()">로그인</button>
            <button class="btn-sub" onclick="showRegister()">회원가입</button>
        </div>
        <div class="auth-box" id="register-box" style="display:none">
            <h2>✏️ 회원가입</h2>
            <input type="text" id="reg-username" placeholder="닉네임 (2~10자)" />
            <input type="password" id="reg-password" placeholder="비밀번호" />
            <input type="password" id="reg-password2" placeholder="비밀번호 확인" />
            <div class="error-msg" id="reg-error"></div>
            <button class="btn-main" onclick="doRegister()">가입하기</button>
            <button class="btn-sub" onclick="showLogin()">로그인으로 돌아가기</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen">
        <h1 class="game-title">🏫 대학 터치 배틀!</h1>
        <div class="top-bar">
            <span class="user-info" id="user-info">👤 닉네임</span>
            <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        </div>

        <select id="university-select">
            <option value="">🎓 대학교 선택</option>
            <option value="가천대">가천대</option>
            <option value="가톨릭대">가톨릭대</option>
            <option value="강원대">강원대</option>
            <option value="건국대">건국대</option>
            <option value="경기대">경기대</option>
            <option value="경북대">경북대</option>
            <option value="경희대">경희대</option>
            <option value="고려대">고려대</option>
            <option value="광운대">광운대</option>
            <option value="GIST">GIST</option>
            <option value="국민대">국민대</option>
            <option value="단국대">단국대</option>
            <option value="DGIST">DGIST</option>
            <option value="명지대">명지대</option>
            <option value="부산대">부산대</option>
            <option value="상명대">상명대</option>
            <option value="서강대">서강대</option>
            <option value="서울과기대">서울과기대</option>
            <option value="서울시립대">서울시립대</option>
            <option value="성균관대">성균관대</option>
            <option value="세종대">세종대</option>
            <option value="숭실대">숭실대</option>
            <option value="연세대">연세대</option>
            <option value="UNIST">UNIST</option>
            <option value="이화여대">이화여대</option>
            <option value="인하대">인하대</option>
            <option value="전남대">전남대</option>
            <option value="전북대">전북대</option>
            <option value="제주대">제주대</option>
            <option value="중앙대">중앙대</option>
            <option value="충남대">충남대</option>
            <option value="충북대">충북대</option>
            <option value="포항공대">포항공대</option>
            <option value="KAIST">KAIST</option>
            <option value="한국외대">한국외대</option>
            <option value="한양대">한양대</option>
            <option value="한양대 ERICA">한양대 ERICA</option>
            <option value="홍익대">홍익대</option>
        </select>

        <div id="title-badge">🏅 칭호 없음</div>

        <div id="touch-area" onclick="handleTouch()">
            <div id="touch-emoji">🎓</div>
            <div id="my-count">0</div>
            <div id="touch-label">탭!</div>
        </div>

        <div id="inventory">
            <h3>🎒 내 아이템</h3>
            <div id="item-list"><span style="color:#ffb3b3; font-size:13px;">아직 아이템이 없어요!</span></div>
        </div>

        <div id="ranking">
            <h2>🏆 실시간 랭킹</h2>
            <div id="ranking-list"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div id="item-popup">
        <div class="popup-emoji" id="popup-emoji">🎁</div>
        <div class="popup-title" id="popup-title">아이템 획득!</div>
        <div class="popup-desc" id="popup-desc">설명</div>
        <button onclick="closePopup()">신난다! 🎉</button>
    </div>

    <script>
        let myCount = 0;
        let selectedUniversity = "";
        let currentEmoji = "🎓";
        let myItems = [];
        let myTitles = [];
        let activeItem = null;
        let token = localStorage.getItem("token") || null;
        let currentUsername = localStorage.getItem("username") || null;

// 피버 타임
        let isFever = false;
        let feverTimeout = null;

        const ITEMS = [
            { id: "fire", emoji: "🔥", name: "불꽃 버튼", desc: "열정 넘치는 불꽃!", chance: 0.08 },
            { id: "star", emoji: "⭐", name: "별 버튼", desc: "반짝반짝 빛나는 별!", chance: 0.10 },
            { id: "rainbow", emoji: "🌈", name: "무지개 버튼", desc: "화려한 무지개!", chance: 0.06 },
            { id: "heart", emoji: "💖", name: "하트 버튼", desc: "사랑을 담아 터치!", chance: 0.12 },
            { id: "lightning", emoji: "⚡", name: "번개 버튼", desc: "빠르다 빠르다!", chance: 0.07 },
            { id: "crown", emoji: "👑", name: "왕관 버튼", desc: "내가 바로 왕!", chance: 0.04 },
            { id: "gem", emoji: "💎", name: "다이아 버튼", desc: "희귀한 다이아!", chance: 0.03 },
            { id: "cat", emoji: "🐱", name: "고양이 버튼", desc: "냥냥 터치~", chance: 0.10 },
        ];

        const TITLES = [
            { count: 10, title: "🌱 새싹 터처" },
            { count: 50, title: "🔥 열정러" },
            { count: 100, title: "💪 터치 고수" },
            { count: 500, title: "⚡ 터치 신인류" },
            { count: 1000, title: "👑 터치의 신" },
        ];

        // ── 시작 시 토큰 확인 ──
        window.onload = () => {
            if (token) loadGame();
            else showAuthScreen();
        };

        function showAuthScreen() {
            document.getElementById("auth-screen").style.display = "block";
            document.getElementById("game-screen").style.display = "none";
        }

        function showLogin() {
            document.getElementById("login-box").style.display = "block";
            document.getElementById("register-box").style.display = "none";
        }

        function showRegister() {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("register-box").style.display = "block";
        }

        async function doLogin() {
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value;
            if (!username || !password) {
                document.getElementById("login-error").textContent = "닉네임과 비밀번호를 입력해주세요!";
                return;
            }
            const form = new FormData();
            form.append("username", username);
            form.append("password", password);
            const res = await fetch("/login", { method: "POST", body: form });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById("login-error").textContent = data.detail;
                return;
            }
            token = data.access_token;
            currentUsername = data.username;
            localStorage.setItem("token", token);
            localStorage.setItem("username", currentUsername);
            loadGame();
        }

        async function doRegister() {
            const username = document.getElementById("reg-username").value.trim();
            const password = document.getElementById("reg-password").value;
            const password2 = document.getElementById("reg-password2").value;
            if (username.length < 2 || username.length > 10) {
                document.getElementById("reg-error").textContent = "닉네임은 2~10자로 입력해주세요!";
                return;
            }
            if (password.length < 4) {
                document.getElementById("reg-error").textContent = "비밀번호는 4자 이상이어야 해요!";
                return;
            }
            if (password !== password2) {
                document.getElementById("reg-error").textContent = "비밀번호가 일치하지 않아요!";
                return;
            }
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById("reg-error").textContent = data.detail;
                return;
            }
            token = data.access_token;
            currentUsername = data.username;
            localStorage.setItem("token", token);
            localStorage.setItem("username", currentUsername);
            loadGame();
        }

        function doLogout() {
            token = null;
            currentUsername = null;
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            myCount = 0;
            myItems = [];
            myTitles = [];
            activeItem = null;
            showAuthScreen();
        }

        async function loadGame() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";

            const res = await fetch("/me", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) { doLogout(); return; }
            const user = await res.json();

            currentUsername = user.username;
            myCount = user.touch_count;
            document.getElementById("user-info").textContent = "👤 " + user.username;
            document.getElementById("my-count").textContent = myCount;

            if (user.university) {
                selectedUniversity = user.university;
                document.getElementById("university-select").value = user.university;
            }
            if (user.items) {
                const savedIds = user.items.split(",").filter(Boolean);
                myItems = ITEMS.filter(i => savedIds.includes(i.id));
            }
            if (user.titles) {
                myTitles = user.titles.split(",").filter(Boolean);
            }

            updateTitleBadge();
            renderInventory();
            loadRanking();
        }

        document.getElementById("university-select").addEventListener("change", function() {
            selectedUniversity = this.value;
        });

        async function handleTouch() {
    if (!selectedUniversity) { alert("대학교를 먼저 선택해주세요!"); return; }

    const point = isFever ? 2 : 1;
    myCount += point;
    document.getElementById("my-count").textContent = myCount;

    const area = document.getElementById("touch-area");
    area.style.background = isFever ? "#fff176" : "#fff0f0";
    setTimeout(() => area.style.background = isFever ? "#fffde7" : "white", 150);

    await fetch("/touch", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ university: selectedUniversity })
    });

    // 피버 발동 확률 (1%)
    if (!isFever && Math.random() < 0.01) startFever();

    checkTitle();
    tryGetItem();
    saveUserData();
    loadRanking();
}

function startFever() {
    isFever = true;
    const area = document.getElementById("touch-area");
    area.style.border = "5px solid #ff9800";
    area.style.background = "#fffde7";
    area.style.boxShadow = "0 8px 0 #ff9800, 0 0 30px #ffeb3b";

    const label = document.getElementById("touch-label");
    label.textContent = "🔥 FEVER! 2배!";
    label.style.color = "#ff9800";

    if (feverTimeout) clearTimeout(feverTimeout);
    feverTimeout = setTimeout(endFever, 5000);
}

function endFever() {
    isFever = false;
    const area = document.getElementById("touch-area");
    area.style.border = "5px solid #ffb3b3";
    area.style.background = "white";
    area.style.boxShadow = "0 8px 0 #ffb3b3";

    const label = document.getElementById("touch-label");
    label.textContent = "탭!";
    label.style.color = "#ffb3b3";
}

        function checkTitle() {
            let earned = null;
            for (const t of TITLES) {
                if (myCount >= t.count) earned = t;
            }
            if (earned && !myTitles.includes(earned.title)) {
                myTitles.push(earned.title);
                showPopup("🏅", "칭호 획득!", earned.title);
            }
            updateTitleBadge();
        }

        function updateTitleBadge() {
            let earned = null;
            for (const t of TITLES) {
                if (myCount >= t.count) earned = t;
            }
            const badge = document.getElementById("title-badge");
            if (earned) {
                badge.textContent = earned.title;
                badge.style.display = "inline-block";
            }
        }

        function tryGetItem() {
            for (const item of ITEMS) {
                if (Math.random() < item.chance) {
                    if (!myItems.find(i => i.id === item.id)) {
                        myItems.push(item);
                        showPopup(item.emoji, item.name + " 획득!", item.desc);
                        renderInventory();
                    }
                    break;
                }
            }
        }

        async function saveUserData() {
            await fetch("/update_user", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    items: myItems.map(i => i.id).join(","),
                    titles: myTitles.join(","),
                    university: selectedUniversity
                })
            });
        }

        function renderInventory() {
            const list = document.getElementById("item-list");
            if (myItems.length === 0) {
                list.innerHTML = '<span style="color:#ffb3b3; font-size:13px;">아직 아이템이 없어요!</span>';
                return;
            }
            list.innerHTML = myItems.map(item => `
                <div class="item-chip ${activeItem === item.id ? 'active' : ''}"
                     onclick="applyItem('${item.id}')" title="${item.desc}">
                    ${item.emoji} ${item.name}
                </div>
            `).join('');
        }

        function applyItem(id) {
            const item = myItems.find(i => i.id === id);
            if (!item) return;
            activeItem = activeItem === id ? null : id;
            currentEmoji = activeItem ? item.emoji : "🎓";
            document.getElementById("touch-emoji").textContent = currentEmoji;
            renderInventory();
        }

        function showPopup(emoji, title, desc) {
            document.getElementById("popup-emoji").textContent = emoji;
            document.getElementById("popup-title").textContent = title;
            document.getElementById("popup-desc").textContent = desc;
            document.getElementById("item-popup").classList.add("show");
            document.getElementById("overlay").classList.add("show");
        }

        function closePopup() {
            document.getElementById("item-popup").classList.remove("show");
            document.getElementById("overlay").classList.remove("show");
        }

        async function loadRanking() {
            const res = await fetch("/ranking");
            const data = await res.json();
            const list = document.getElementById("ranking-list");
            const medals = ["🥇", "🥈", "🥉"];
            list.innerHTML = "";
            data.ranking.forEach((item, index) => {
                list.innerHTML += `
                    <div class="rank-item">
                        <span class="rank-num">${medals[index] || (index + 1)}</span>
                        <span class="rank-name">${item.university}</span>
                        <span class="rank-count">${item.count.toLocaleString()}번</span>
                    </div>
                `;
            });
        }

        setInterval(loadRanking, 3000);
    </script>
</body>
</html>
